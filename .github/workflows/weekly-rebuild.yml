name: Weekly Dashboard Rebuild

on:
  schedule:
    # Every Monday at 12:00 UTC = 7:00 AM Eastern (8:00 AM during DST)
    - cron: '0 12 * * 1'
  workflow_dispatch:  # Allow manual trigger from the Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh dashboard
        env:
          PRESET_API_TOKEN: ${{ secrets.PRESET_API_TOKEN }}
          PRESET_API_SECRET: ${{ secrets.PRESET_API_SECRET }}
        run: python scripts/refresh_dashboard.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Weekly dashboard rebuild: $(date -u +'%Y-%m-%d')"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: rebuild
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
